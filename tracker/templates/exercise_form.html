{% extends "base.html" %}
{% block title %}Add Exercise · CoreGuard{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="surface-card surface-card-soft p-4 p-lg-5 mb-4">
      <div class="section-kicker">Exercise management</div>
      <h1 class="h3 mb-2">Add New Exercise</h1>
      <p class="cg-muted mb-0">Add a new exercise to the CoreGuard library with a clear description, body area, and difficulty level.</p>
    </div>

    <div class="surface-card p-4 p-lg-5">
      <form method="post" enctype="multipart/form-data" class="form-shell">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="d-flex flex-wrap gap-2 mt-3">
          <button type="submit" class="btn btn-primary">Save</button>
          <a href="{% url 'exercise_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
