{% extends "base.html" %}
{% block title %}Add Exercise · Physio Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card page-card shadow-sm">
      <div class="card-body">
        <h1 class="h4 mb-3">Add New Exercise</h1>
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          {{ form.as_p }}
          <button type="submit" class="btn btn-primary">Save</button>
          <a href="{% url 'exercise_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
