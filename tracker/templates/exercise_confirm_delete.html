{% extends "base.html" %}
{% block title %}Delete Exercise{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="danger-card p-4 p-lg-5">
      <div class="section-kicker">Delete exercise</div>
      <h1 class="h3 mb-3">Remove {{ exercise.name }}?</h1>
      <p class="cg-muted mb-4">This will permanently delete the exercise from the library, so it should only be done if you no longer need it.</p>
      <form method="post">
        {% csrf_token %}
        <div class="d-flex flex-wrap gap-2">
          <button type="submit" class="btn btn-danger">Delete</button>
          <a href="{% url 'exercise_detail' exercise.pk %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
