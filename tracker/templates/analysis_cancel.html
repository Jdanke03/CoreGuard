{% extends 'base.html' %}

{% block title %}Cancel Session{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="danger-card p-4 p-lg-5">
      <div class="section-kicker">Cancel live session</div>
      <h1 class="h3 mb-3">Discard this session?</h1>
      <p class="cg-muted mb-4">This will remove the current live analysis session and return you to the start page.</p>
      <form method="post">
        {% csrf_token %}
        <div class="d-flex flex-wrap gap-2">
          <button type="submit" class="btn btn-outline-danger">Discard Session</button>
          <a href="{% url 'analysis_live' session.id %}" class="btn btn-outline-secondary">Keep Session</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
