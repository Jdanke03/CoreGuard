{% extends 'base.html' %}

{% block title %}Cancel Session{% endblock %}

{% block content %}
<div class="card page-card p-4">
  <h1 class="h4 mb-3">Cancel Session</h1>
  <p class="text-muted">This will discard the current session and return you to start.</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-outline-danger">Discard Session</button>
    <a href="{% url 'analysis_live' session.id %}" class="btn btn-outline-secondary">Keep Session</a>
  </form>
</div>
{% endblock %}
