{% extends 'base.html' %}

{% block title %}Live Analysis{% endblock %}

{% block content %}
<div class="card page-card p-4">
  <h1 class="h4 mb-3">Live Squat Analysis</h1>
  <p class="text-muted">Session ID: {{ session.id }}</p>

  <div class="border rounded bg-dark d-flex align-items-center justify-content-center" style="height: 520px;">
    <img
      src="{% url 'analysis_stream' session.id %}"
      alt="Live camera feed"
      class="img-fluid"
      style="max-height: 500px;"
    >
  </div>

  <div class="mt-3">
    <p class="mb-2">Pose overlay is enabled. Rule alerts will appear here.</p>
    <a class="btn btn-outline-secondary" href="{% url 'analysis_stop' session.id %}">End Session</a>
    <a class="btn btn-outline-danger" href="{% url 'analysis_cancel' session.id %}">Cancel</a>
  </div>
</div>
{% endblock %}
